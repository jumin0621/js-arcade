<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>JS-Arcade | JS-Puzzle</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="game-wrapper">
			<div class="game-header">
				<div class="info-item">
					<span class="info-label">MOVES</span>
					<span id="moveDisplay" class="info-value">0</span>
				</div>

				<div class="hint-container" id="hintContainer">
					<div class="hint-thumb" id="hintThumb"></div>
					<span class="hint-label">HINT</span>
					<div class="hint-preview" id="hintPreview"></div>
				</div>

				<div class="info-item right">
					<span class="info-label">DIFFICULTY</span>
					<span id="diffDisplay" class="info-value">READY</span>
				</div>
			</div>

			<div class="canvas-container">
				<div id="puzzleBoard" class="puzzle-board"></div>
			</div>

			<div class="controls-guide">
				<p>🧩 조각을 클릭하여 빈칸으로 이동시키세요.</p>
				<p>이미지를 완벽하게 복구하면 디버깅 완료!</p>
			</div>
		</div>

		<div id="gameModal" class="modal-overlay">
			<div class="modal-content">
				<h2 id="modalTitle">JS-PUZZLE</h2>
				<p id="modalMessage">
					이미지가 손상되었습니다.<br />난이도를 선택하여 이미지를 복구하세요.
				</p>

				<div id="difficulty-options">
					<button class="diff-btn" data-grid="3">초급 (3x3)</button>
					<button class="diff-btn" data-grid="5">중급 (5x5)</button>
					<button class="diff-btn" data-grid="7">고급 (7x7)</button>
				</div>

				<div id="resultOptions" class="result-options" style="display: none">
					<button class="action-btn" onclick="location.reload()">
						새 게임 하기
					</button>
					<button
						class="action-btn main-btn"
						onclick="location.href = '../../index.html'"
					>
						메인으로
					</button>
				</div>
			</div>
		</div>

		<script src="js-puzzle.js"></script>
	</body>
</html>
