<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>JS-Arcade | JS-Bounce</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="game-wrapper">
			<div class="game-header">
				<div class="stage-container">
					<span class="label">STAGE</span>
					<span id="stage" class="value">1</span>
				</div>
			</div>

			<div class="canvas-container">
				<canvas id="bounceGame" width="400" height="400"></canvas>
			</div>

			<div class="mobile-controls">
				<button id="leftBtn">◀</button>
				<button id="rightBtn">▶</button>
			</div>

			<div id="gameModal" class="modal-overlay">
				<div class="modal-content">
					<h2 id="modalTitle">JS-BOUNCE BALL</h2>
					<p id="modalDesc">좌우 방향키로 다음 세상으로 나아가세요!</p>
					<button id="startBtn" class="primary-btn">게임 시작</button>
				</div>
			</div>
		</div>
		<script src="js-bounce.js"></script>
	</body>
</html>
