<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>JS-Arcade | 브릭 스택</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="game-wrapper">
			<div class="game-header">
				<div class="stage-container">
					<span class="label">SCORE</span>
					<span id="score" class="value">0</span>
				</div>
			</div>

			<div class="main-layout">
				<div class="canvas-container">
					<canvas id="tetris" width="240" height="400"></canvas>
				</div>

				<div class="side-panel">
					<div class="next-box">
						<p class="side-label">NEXT</p>
						<canvas id="next" width="80" height="80"></canvas>
					</div>

					<div class="mobile-controls">
						<button class="ctrl-btn rotate" id="btnRotate">↻</button>
						<div class="arrow-group">
							<button class="ctrl-btn" id="btnLeft">←</button>
							<button class="ctrl-btn" id="btnDown">↓</button>
							<button class="ctrl-btn" id="btnRight">→</button>
						</div>
						<button class="ctrl-btn space" id="btnSpace">DROP</button>
					</div>
				</div>
			</div>

			<div id="gameModal" class="modal-overlay">
				<div class="modal-content">
					<h2 id="modalTitle">JS-BRICK STACK</h2>
					<p id="modalDesc">블록을 쌓아 라인을 클리어하세요!</p>
					<button id="startBtn" class="primary-btn">게임 시작</button>
				</div>
			</div>
		</div>
		<script src="js-brickStack.js"></script>
	</body>
</html>
