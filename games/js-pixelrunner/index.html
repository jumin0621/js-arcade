<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>JS-Arcade | JS-PixelRunner</title>
		<link rel="stylesheet" href="style.css" />
		<link rel="icon" type="image/png" href="../../assets/img/logo.png" />
	</head>
	<body>
		<div class="game-wrapper">
			<div class="game-header">
				<div class="info-item">
					<span class="info-label">DISTANCE</span>
					<span id="scoreDisplay" class="info-value">0</span
					><span class="unit">m</span>
				</div>
				<div class="info-item right">
					<span class="info-label">STATUS</span>
					<span id="statusDisplay" class="info-value">READY</span>
				</div>
			</div>

			<div class="canvas-container">
				<canvas id="gameCanvas" tabindex="0"></canvas>
			</div>

			<div class="mobile-controls">
				<button id="btnJump" class="ctrl-btn-large">JUMP</button>
			</div>

			<div class="controls-guide">
				<p>⌨️ <span>Space / 방향키 ↑ </span> 점프</p>
				<p>노란색 아이템을 먹으면 <span>무적모드</span> 가 발동됩니다</p>
			</div>
		</div>

		<div id="gameModal" class="modal-overlay">
			<div class="modal-content">
				<h2 id="modalTitle">JS-PIXEL RUNNER</h2>
				<div class="pixel-icon-container">
					<div class="pixel-runner-icon"></div>
				</div>
				<p id="modalText">픽셀 버그들을 피해 질주하세요.</p>
				<button id="startBtn" class="primary-btn">게임시작</button>
			</div>
		</div>
		<script src="js-pixelrunner.js"></script>
	</body>
</html>
