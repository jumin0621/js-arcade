<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>JS-Arcade | 바닐라JS 웹게임 창고</title>
		<link rel="icon" type="image/png" href="logo.png" />
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header>
			<a
				href="index.html"
				class="logo-group"
				aria-label="JS-Arcade 홈으로 이동"
			>
				<img
					src="https://i.ibb.co/21Jb6jD1/image.png"
					alt="JS-Arcade 로고 심볼"
					class="logo-symbol"
				/>
				<span class="logo-text">JS-Arcade</span>
			</a>
			<nav>
				<ul>
					<li><a href="#">인기게임</a></li>
					<li><a href="#">카테고리</a></li>
					<li>
						<a
							href="https://imgtocode.tistory.com"
							target="_blank"
							rel="noopener noreferrer"
							>커뮤니티</a
						>
					</li>
				</ul>
			</nav>
		</header>

		<main>
			<section id="selection-room">
				<div class="search-area">
					<h1>어떤 게임을 즐기고 싶으신가요?</h1>
					<p class="sub-text">
						바닐라 JS로 제작된 다양한 미니게임을 만나보세요.
					</p>
					<label for="game-search" class="visually-hidden">게임 검색</label>
					<input
						type="text"
						id="game-search"
						placeholder="게임 제목을 입력하세요..."
					/>
				</div>

				<aside class="ad-container">
					<a
						href="https://open.kakao.com/o/sSTaIFpi"
						target="_blank"
						rel="noopener noreferrer"
						class="ad-banner"
					>
						<div class="ad-content">
							<p>📢 광고 및 제휴 문의 (오픈카톡)</p>
						</div>
					</a>
				</aside>

				<h2 class="visually-hidden">최신 게임 리스트</h2>
				<div class="game-grid" id="game-list"></div>
			</section>

			<section id="play-room" style="display: none">
				<h2 class="visually-hidden">게임 플레이</h2>
				<div style="text-align: left; margin-bottom: 15px">
					<button
						type="button"
						onclick="exitGame()"
						style="
							background: none;
							border: none;
							color: #00e5ff;
							cursor: pointer;
							font-weight: bold;
							font-size: 1rem;
						"
					>
						← 다른 게임 선택하기
					</button>
				</div>
				<iframe
					id="game-container"
					src=""
					title="웹게임 실행 창"
					style="
						width: 100%;
						height: 550px;
						border: none;
						border-radius: 12px;
						background: #1e1e1e;
						box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
					"
				></iframe>
			</section>
		</main>

		<footer class="site-footer">
			<div class="footer-content">
				<a href="index.html" class="footer-logo">
					<img
						src="https://i.ibb.co/21Jb6jD1/image.png"
						alt="JS-Arcade 하단 로고"
					/>
				</a>
				<h2 class="footer-title">JS-Arcade</h2>
				<p class="footer-description">Pure Vanilla JS Web Game Archive</p>
				<nav class="footer-links">
					<a
						href="https://github.com/jumin0621"
						target="_blank"
						rel="noopener noreferrer"
						>GitHub</a
					>
					<a
						href="https://imgtocode.tistory.com"
						target="_blank"
						rel="noopener noreferrer"
						>Tistory</a
					>
				</nav>
				<p class="copyright">
					&copy; 2026 <strong>imgtocode</strong>. All rights reserved.
				</p>
			</div>
		</footer>

		<script src="main.js"></script>
	</body>
</html>
